@let range = dateRange();
<div class="filters-row">
  <mat-form-field class="filters-row__date-field" appearance="outline" subscriptSizing="dynamic">
    <mat-label>Date range</mat-label>
    <mat-date-range-input [rangePicker]="picker">
      <input
        matStartDate
        placeholder="dd.mm.yyyy"
        [value]="range.fromDate"
        (dateChange)="onDateInputChange('from', $event.value)"
      />
      <input
        matEndDate
        placeholder="dd.mm.yyyy"
        [value]="range.untilDate"
        (dateChange)="onDateInputChange('until', $event.value)"
      />
    </mat-date-range-input>
    @if (hasDateRangeValueSignal()) {
      <button
        mat-icon-button
        matSuffix
        type="button"
        class="date-suffix-btn"
        aria-label="Clear date range"
        (click)="clearDateRange($event)"
      >
        <mat-icon>close</mat-icon>
      </button>
    } @else {
      <mat-datepicker-toggle matSuffix class="date-suffix-btn" [for]="picker"></mat-datepicker-toggle>
    }
    <mat-date-range-picker #picker></mat-date-range-picker>
  </mat-form-field>

  <button mat-flat-button color="primary" type="button" (click)="apply.emit()">
    <mat-icon>search</mat-icon>
    <span>Apply</span>
  </button>
</div>
