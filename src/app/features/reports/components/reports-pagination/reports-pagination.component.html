@let pager = paginatorData();
<div class="reports-pagination">
  <ul class="reports-pagination__list">
  <div class="reports-pagination__size">
    <span class="reports-pagination__size-label">Rows per page:</span>
    <mat-form-field class="reports-pagination__size-field" appearance="outline" subscriptSizing="dynamic">
      <mat-select
        [value]="pager.pageSize"
        (selectionChange)="onPageSizeSelectionChange($event.value)"
      >
        @for (option of pager.pageSizeOptions; track option) {
          <mat-option [value]="option">{{ option }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>

    <li>
      <button
        type="button"
        class="reports-pagination__btn"
        [disabled]="!canGoPrevSignal()"
        (click)="goPrev()"
      >
        <mat-icon>chevron_left</mat-icon>
      </button>
    </li>

    @for (page of visiblePagesSignal(); track $index) {
      @if (page === 'dots') {
        <li class="reports-pagination__dots">...</li>
      } @else {
        <li>
          <button
            type="button"
            class="reports-pagination__number"
            [class.reports-pagination__number--active]="page === pager.currentPage"
            (click)="goToPage(page)"
          >
            {{ page }}
          </button>
        </li>
      }
    }

    <li>
      <button
        type="button"
        class="reports-pagination__btn"
        [disabled]="!canGoNextSignal()"
        (click)="goNext()"
      >
        <mat-icon>chevron_right</mat-icon>
      </button>
    </li>
  </ul>
</div>
